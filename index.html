<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BODA AI-Trade | Premium Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <header class="header">
        <div class="logo">BODA <span>AI-Trade</span></div>
        <nav class="nav-links">
            <a href="#" class="active">الرئيسية</a>
            <a href="#">الكريبتو</a>
            <a href="#">الفوركس</a>
            <a href="#">الذهب</a>
        </nav>
        <a href="https://www.tiktok.com/@bo_da.0" target="_blank" class="tiktok"><i class="fab fa-tiktok"></i> @bo_da.0</a>
    </header>

    <div class="ticker-container">
        <div class="tradingview-widget-container">
            <div class="tradingview-widget-container__widget"></div>
            <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-ticker-tape.js" async>
            {
            "symbols": [
                {"proName": "BINANCE:BTCUSDT", "title": "Bitcoin"},
                {"proName": "BINANCE:ETHUSDT", "title": "Ethereum"},
                {"proName": "FX:EURUSD", "title": "EUR/USD"},
                {"proName": "OANDA:XAUUSD", "title": "Gold"}
            ],
            "showSymbolLogo": true,
            "colorTheme": "dark",
            "isTransparent": false,
            "displayMode": "adaptive",
            "locale": "ar_AE"
            }
            </script>
        </div>
    </div>

    <main class="dashboard-grid">
        
        <div class="col-left">
            <div class="card ai-card">
                <div class="card-header"><i class="fas fa-microchip"></i> النتيجة النهائية - AI Signal</div>
                
                <div class="timeframes">
                    <button class="tf-btn" data-tf="5m">5 د</button>
                    <button class="tf-btn" data-tf="15m">15 د</button>
                    <button class="tf-btn active" data-tf="1H">1 س</button>
                    <button class="tf-btn" data-tf="4H">4 س</button>
                    <button class="tf-btn" data-tf="1D">يومي</button>
                </div>

                <div class="gauge-box">
                    <div class="gauge">
                        <div class="gauge-bg"></div>
                        <div class="gauge-fill" id="gauge-fill"></div>
                        <div class="gauge-cover"></div>
                        <div class="gauge-needle" id="gauge-needle"></div>
                    </div>
                    <div class="ai-result-text" id="ai-text">صاعد / Bullish</div>
                    <div class="ai-confidence">نسبة قوة الإشارة: <span id="ai-percent">85%</span></div>
                </div>
            </div>

            <div class="card tech-card">
                <div class="card-header"><i class="fas fa-chart-pie"></i> Technical Rating</div>
                <div class="tradingview-widget-container" style="height: 280px;">
                    <div class="tradingview-widget-container__widget"></div>
                    <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-technical-analysis.js" async>
                    {
                    "interval": "1h",
                    "width": "100%",
                    "isTransparent": true,
                    "height": "100%",
                    "symbol": "BINANCE:BTCUSDT",
                    "showIntervalTabs": true,
                    "displayMode": "multiple",
                    "locale": "ar_AE",
                    "colorTheme": "dark"
                    }
                    </script>
                </div>
            </div>
        </div>

        <div class="col-center">
            <div class="card chart-card">
                <div id="tv_main_chart" style="width: 100%; height: 100%;"></div>
            </div>

            <div class="card indicators-card">
                <div class="card-header"><i class="fas fa-chart-bar"></i> RSI & MACD Indicators</div>
                <div id="tv_indicators_chart" style="width: 100%; height: 100%;"></div>
            </div>
        </div>

        <div class="col-right">
            <div class="card news-card">
                <div class="card-header"><i class="fas fa-newspaper"></i> أحدث الأخبار المباشرة</div>
                <div class="tradingview-widget-container" style="height: 350px;">
                  <div class="tradingview-widget-container__widget"></div>
                  <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-timeline.js" async>
                  {
                  "feedMode": "all_symbols",
                  "colorTheme": "dark",
                  "isTransparent": true,
                  "displayMode": "regular",
                  "width": "100%",
                  "height": "100%",
                  "locale": "ar_AE"
                  }
                  </script>
                </div>
            </div>

            <div class="card alerts-card">
                <div class="card-header"><i class="fas fa-bell"></i> Opportunity Alerts</div>
                <div class="alerts-grid">
                    <div class="alert-box gold">
                        <i class="fab fa-bitcoin"></i>
                        <span>BTC/USDT</span>
                        <small>Strong Buy</small>
                    </div>
                    <div class="alert-box silver">
                        <i class="fab fa-ethereum"></i>
                        <span>ETH/USDT</span>
                        <small>Buy</small>
                    </div>
                    <div class="alert-box bronze">
                        <i class="fas fa-coins"></i>
                        <span>XAU/USD</span>
                        <small>Sell</small>
                    </div>
                </div>
            </div>
        </div>

    </main>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script src="script.js"></script>
</body>
</html>
