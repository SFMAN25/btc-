<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BODA AI-Trade | Pro Intelligence</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <header class="header">
        <div class="logo">BODA <span>AI-Trade</span></div>
        <nav class="nav-links" id="main-nav">
            <a href="#" class="nav-item active" data-symbol="BINANCE:BTCUSDT">الكريبتو</a>
            <a href="#" class="nav-item" data-symbol="FX:EURUSD">الفوركس</a>
            <a href="#" class="nav-item" data-symbol="OANDA:XAUUSD">الذهب</a>
        </nav>
        <div class="header-right">
            <span id="market-status" class="status-online">● الأنظمة متصلة</span>
            <a href="https://www.tiktok.com/@bo_da.0" target="_blank" class="tiktok"><i class="fab fa-tiktok"></i> @bo_da.0</a>
        </div>
    </header>

    <main class="dashboard-grid">
        
        <aside class="col-side">
            <div class="card ai-main-card">
                <div class="card-header"><i class="fas fa-robot"></i> AI Signal Analysis</div>
                <div class="gauge-box">
                    <div class="gauge">
                        <div class="gauge-bg"></div>
                        <div class="gauge-cover"></div>
                        <div class="gauge-needle" id="gauge-needle"></div>
                    </div>
                    <div class="ai-result-text" id="ai-text">جاري التحليل...</div>
                    <div class="ai-confidence">قوة الإشارة: <span id="ai-percent">--</span></div>
                </div>
            </div>

            <div class="card indicators-suggestion">
                <div class="card-header"><i class="fas fa-lightbulb"></i> Indicator Suggestions</div>
                <div id="ai-indicator-tips" class="suggestion-list">
                    </div>
            </div>

            <div class="card tech-card">
                <div class="card-header"><i class="fas fa-chart-pie"></i> Technical Summary</div>
                <div id="tv-technical-summary" style="height: 300px;"></div>
            </div>
        </aside>

        <section class="col-main">
            <div class="card chart-card">
                <div id="tv_main_chart" style="height: 100%;"></div>
            </div>

            <div class="card ai-economic-news">
                <div class="card-header"><i class="fas fa-university"></i> AI Economic Insight (Bank & Institutional Feed)</div>
                <div id="ai-institutional-feed" class="news-grid">
                    </div>
            </div>
        </section>

        <aside class="col-side">
            <div class="card indicators-chart-card">
                <div class="card-header"><i class="fas fa-wave-square"></i> RSI & MACD Momentum</div>
                <div id="tv_indicators_chart" style="height: 250px;"></div>
            </div>

            <div class="card live-news">
                <div class="card-header"><i class="fas fa-broadcast-tower"></i> Live Finance Stream</div>
                <div id="tv-news-timeline" style="height: 400px;"></div>
            </div>
        </aside>

    </main>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script src="script.js"></script>
</body>
</html>
