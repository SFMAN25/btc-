<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BODA AI-Trade | Pro Intelligence</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <header class="header">
        <div class="logo">BODA <span>AI-Trade</span></div>
        <nav class="nav-links">
            <a href="#" class="nav-item active" data-symbol="BINANCE:BTCUSDT">الكريبتو</a>
            <a href="#" class="nav-item" data-symbol="FX:EURUSD">الفوركس</a>
            <a href="#" class="nav-item" data-symbol="OANDA:XAUUSD">الذهب</a>
        </nav>
        <a href="https://www.tiktok.com/@bo_da.0" target="_blank" class="tiktok"><i class="fab fa-tiktok"></i> @bo_da.0</a>
    </header>

    <main class="dashboard-grid">
        
        <div class="col-left">
            <div class="card ai-card">
                <div class="card-header"><i class="fas fa-microchip"></i> AI Signal Analysis</div>
                <div class="gauge-box">
                    <div class="gauge">
                        <div class="gauge-bg"></div>
                        <div class="gauge-cover"></div>
                        <div class="gauge-needle" id="gauge-needle"></div>
                    </div>
                    <div class="ai-result-text" id="ai-text">جاري التحليل...</div>
                    <div class="ai-confidence">قوة الإشارة: <span id="ai-percent">--</span></div>
                </div>
            </div>
            
            <div class="card indicators-suggestion">
                <div class="card-header"><i class="fas fa-lightbulb"></i> Indicator Suggestions</div>
                <ul id="indicator-tips" style="list-style: none; padding: 0; font-size: 14px; color: #888;">
                    </ul>
            </div>
        </div>

        <div class="col-center">
            <div class="card chart-card">
                <div id="tv_main_chart" style="width: 100%; height: 100%;"></div>
            </div>

            <div class="card ai-news-card">
                <div class="card-header"><i class="fas fa-university"></i> AI Economic Insight (Bank & Institutional Feed)</div>
                <div id="ai-news-feed" style="font-size: 13px; color: #EAECEF; max-height: 150px; overflow-y: auto;">
                    </div>
            </div>

            <div class="card technical-summary-center">
                <div class="card-header"><i class="fas fa-chart-line"></i> Technical Analysis Summary</div>
                <div id="tv-tech-analysis-content" style="height: 300px;"></div>
            </div>
        </div>

        <div class="col-right">
            <div class="card news-card">
                <div class="card-header"><i class="fas fa-newspaper"></i> Live Finance Stream</div>
                <div id="tv-news-timeline" style="height: 600px;"></div>
            </div>
        </div>

    </main>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script src="script.js"></script>
</body>
</html>
