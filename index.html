<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BODA AI-Trade | منصة التحليل الذكي</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
</head>
<body class="dark-theme">

    <header class="main-header">
        <div class="logo">BODA <span>AI-Trade</span></div>
        <nav class="nav-bar">
            <a href="#" class="nav-item active" data-market="BTCUSDT">الرئيسية</a>
            <a href="#" class="nav-item" data-market="BINANCE:BTCUSDT">الكريبتو</a>
            <a href="#" class="nav-item" data-market="FX:EURUSD">الفوركس</a>
            <a href="#" class="nav-item" data-market="OANDA:XAUUSD">الذهب</a>
        </nav>
        <div class="user-profile">
            <a href="https://www.tiktok.com/@bo_da.0" target="_blank" class="tiktok-link">@bo_da.0 <i class="fab fa-tiktok"></i></a>
        </div>
    </header>

    <div class="container">
        <div class="top-row">
            <div class="card ai-gauge-card">
                <h3>النتيجة النهائية - AI Signal</h3>
                <div class="gauge-container">
                    <div class="gauge-body">
                        <div class="gauge-fill" id="gauge-ptr"></div>
                        <div class="gauge-cover"></div>
                    </div>
                    <div class="gauge-value" id="ai-result">تحليل...</div>
                </div>
                <p id="ai-status-text">ثقة الذكاء الاصطناعي: 85%</p>
            </div>

            <div class="card technical-analysis">
                <div class="tradingview-widget-container">
                    <div class="tradingview-widget-container__widget"></div>
                    <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-technical-analysis.js" async>
                    {
                        "interval": "1h",
                        "width": "100%",
                        "isTransparent": true,
                        "height": "100%",
                        "symbol": "BINANCE:BTCUSDT",
                        "showIntervalTabs": true,
                        "displayMode": "single",
                        "locale": "ar",
                        "colorTheme": "dark"
                    }
                    </script>
                </div>
            </div>
        </div>

        <div class="main-grid">
            <div class="card chart-main">
                <div id="tradingview_boda"></div>
            </div>

            <div class="card news-card">
                <h3>أخبار Investing.com المباشرة</h3>
                <iframe src="https://sslecal2.investing.com?columns=exc_flags,exc_actual,exc_forecast,exc_previous&importance=2,3&features=datepicker,timezone&countries=5,25,32,37,72,22,17,4,26,10,11,43,20,38,110,11,12&calType=day&timeZone=15&lang=18" width="100%" height="100%" frameborder="0" allowtransparency="true"></iframe>
            </div>

            <div class="card x-card">
                <h3>نبض X المباشر</h3>
                <div class="x-scroll">
                    <a class="twitter-timeline" data-theme="dark" href="https://twitter.com/EATrading0">Tweets by EATrading0</a> 
                    <script async src="https://platform.twitter.com/widgets.js" charset="utf-8"></script>
                </div>
            </div>
        </div>
    </div>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script src="script.js"></script>
</body>
</html>
